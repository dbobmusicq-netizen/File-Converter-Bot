name: TBC Advanced Converter Worker

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Telegram Chat ID'
        required: true
      message_id:
        description: 'Original Message ID containing the file'
        required: true
      status_msg_id:
        description: 'Message ID of the TBC status message to edit'
        required: true
      target_format:
        description: 'Format to convert to'
        required: true

jobs:
  convert-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # TRICK 1: --no-install-recommends skips bloatware, saving ~1-2 minutes of setup time
      - name: Install System Dependencies (Extremely Fast)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg imagemagick libreoffice calibre

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # TRICK 2: Caches pip installs for future runs

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Run Converter Worker
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          MESSAGE_ID: ${{ github.event.inputs.message_id }}
          STATUS_MSG_ID: ${{ github.event.inputs.status_msg_id }}
          TARGET_FORMAT: ${{ github.event.inputs.target_format }}
        run: python worker.py
